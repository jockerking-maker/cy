<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法律文档智能问答系统</title>
<style>
    :root {
    --primary: #1a56db;
    --primary-light: #e8effd;
    --primary-dark: #1e40af;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
    --transition: 0.2s ease;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }  -webkit-font-smoothing: antialiased;

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.92);

  .header h1 {
    font-size: 18px;
    font-weight: 600;
  }
  .header .badge {
    font-size: 11px;
    background: var(--primary-light);
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .status-bar {
    display: flex;
    gap: 16px;
    margin-left: auto;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .status-dot.online { background: linear-gradient(90deg, var(--success), #22c55e); }
  .status-dot.offline { background: linear-gradient(90deg, var(--danger), #ef4444); }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .search-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .search-box textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box textarea:focus {
    border-color: var(--primary);
  }
  .search-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }
  .search-actions .hint {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: #1648c0; }
  .btn-primary:disabled {
    background: #93b3f0;
    cursor: not-allowed;
  }
  .btn-outline {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { background: var(--bg); }

  .example-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .example-tag {
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 16px;
    background: var(--primary-light);
    color: var(--primary);
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .example-tag:hover { background: #d4e2fc; }

  .result-area {
    display: none;
  }
  .result-area.visible {
    display: block;
  }

  .answer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .answer-card h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .answer-text {
    font-size: 15px;
    line-height: 1.8;
    white-space: pre-wrap;
  }
.answer-text h1,.answer-text h2,.answer-text h3 { margin: 16px 0 8px 0; font-weight: 600; line-height: 1.4; }
.answer-text h1 { font-size: 20px; } .answer-text h2 { font-size: 18px; } .answer-text h3 { font-size: 16px; }
.answer-text p { margin: 8px 0; }
.answer-text ul,.answer-text ol { margin: 8px 0; padding-left: 24px; }
.answer-text li { margin: 4px 0; }
.answer-text strong { font-weight: 600; }
.answer-text code { background: #f1f5f9; padding: 2px 7px; border-radius: 4px; font-size: 13px; font-family: var(--font-mono); color: #e11d48; }
.answer-text pre { background: #1e293b; color: #e2e8f0; padding: 16px 20px; border-radius: var(--radius-sm); overflow-x: auto; margin: 12px 0; font-size: 13px; line-height: 1.6; }
.answer-text pre code { background: transparent; padding: 0; color: inherit; font-size: inherit; }
.answer-text blockquote { border-left: 3px solid var(--primary); padding: 8px 16px; margin: 12px 0; background: #f8fafc; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; color: var(--text-secondary); }
.answer-text table { border-collapse: collapse; margin: 12px 0; width: 100%; font-size: 14px; }
.answer-text th,.answer-text td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.answer-text th { background: #f8fafc; font-weight: 600; }
.answer-text hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.answer-text a { color: var(--primary); text-decoration: underline; }
  .answer-text .citation {
    color: var(--primary);
    font-weight: 500;
    cursor: pointer;
  }

  .confidence-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
  }
  .confidence-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s;
  }
  .confidence-fill.high { background: linear-gradient(90deg, var(--success), #22c55e); }
  .confidence-fill.medium { background: linear-gradient(90deg, var(--warning), #f59e0b); }
  .confidence-fill.low { background: linear-gradient(90deg, var(--danger), #ef4444); }

  .references-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .references-card h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .ref-item {
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height: 1.6;
  }  transition: border-color var(--transition);

  .ref-item:hover { border-color: var(--primary); }
.ref-item:last-child { margin-bottom: 0; }
  .ref-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .ref-level {
    background: var(--primary-light);
    color: var(--primary);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .ref-text { color: var(--text); }

  .hallucination-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .hallucination-card h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .hc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 14px;
  }
  .hc-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .hc-dot.safe { background: linear-gradient(90deg, var(--success), #22c55e); }
  .hc-dot.unsafe { background: linear-gradient(90deg, var(--danger), #ef4444); }
  .hc-dot.uncertain { background: linear-gradient(90deg, var(--warning), #f59e0b); }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
  }
  .loading.visible { display: block; }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: var(--danger);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .error-msg.visible { display: block; }

  @media (max-width: 640px) {
    .header { padding: 12px 16px; }
    .header h1 { font-size: 16px; }
    .status-bar { font-size: 12px; gap: 8px; }
    .container { padding: 16px 12px; }
    .search-box { padding: 16px; }
    .answer-card, .references-card, .hallucination-card { padding: 16px; }
  }

/* ===== Centered Chat Assistant ===== */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 998;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.chat-overlay.open { display: block; opacity: 1; }

.chat-toggle {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a56db, #2563eb);
  color: white;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(26, 86, 219, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  z-index: 1000;
  transition: all 0.3s ease;
}
.chat-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(26, 86, 219, 0.45); }
.chat-toggle svg { width: 26px; height: 26px; fill: currentColor; }

.chat-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.92);
  width: 720px;
  max-width: calc(100vw - 48px);
  height: 80vh;
  max-height: 700px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 16px 60px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  overflow: hidden;
  border: 1px solid var(--border);
}
.chat-panel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}

.chat-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, #1a56db, #2563eb);
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-header-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 600;
}
.chat-header-actions { display: flex; gap: 6px; }
.chat-header-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: background 0.2s;
}
.chat-header-btn:hover { background: rgba(255,255,255,0.35); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  background: #f8fafc;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.chat-msg {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.7;
  position: relative;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: var(--primary);
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant {
  align-self: flex-start;
  background: white;
  color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  width: 100%;
  max-width: 100%;
}

.chat-msg.assistant h1,.chat-msg.assistant h2,.chat-msg.assistant h3 { margin: 12px 0 6px 0; font-weight: 600; line-height: 1.4; }
.chat-msg.assistant h1 { font-size: 17px; } .chat-msg.assistant h2 { font-size: 15px; } .chat-msg.assistant h3 { font-size: 14px; }
.chat-msg.assistant p { margin: 6px 0; }
.chat-msg.assistant ul,.chat-msg.assistant ol { margin: 6px 0; padding-left: 22px; }
.chat-msg.assistant li { margin: 3px 0; }
.chat-msg.assistant strong { font-weight: 600; }
.chat-msg.assistant code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: var(--font-mono); color: #e11d48; }
.chat-msg.assistant pre { background: #1e293b; color: #e2e8f0; padding: 14px 16px; border-radius: 10px; overflow-x: auto; margin: 10px 0; font-size: 13px; line-height: 1.5; }
.chat-msg.assistant pre code { background: transparent; padding: 0; color: inherit; font-size: inherit; }
.chat-msg.assistant blockquote { border-left: 3px solid var(--primary); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); }
.chat-msg.assistant table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 13px; }
.chat-msg.assistant th,.chat-msg.assistant td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.chat-msg.assistant th { background: #f1f5f9; font-weight: 600; }.chat-msg .msg-time {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 6px;
  display: block;
}
.chat-msg.user .msg-time { text-align: right; }

/* Markdown rendered content */
.chat-msg.assistant h1, .chat-msg.assistant h2, .chat-msg.assistant h3 {
  margin: 12px 0 6px 0;
  font-weight: 600;
  line-height: 1.4;
}
.chat-msg.assistant h1 { font-size: 18px; }
.chat-msg.assistant h2 { font-size: 16px; }
.chat-msg.assistant h3 { font-size: 15px; }
.chat-msg.assistant p { margin: 6px 0; }
.chat-msg.assistant ul, .chat-msg.assistant ol { margin: 6px 0; padding-left: 22px; }
.chat-msg.assistant li { margin: 3px 0; }
.chat-msg.assistant strong { font-weight: 600; }
.chat-msg.assistant em { font-style: italic; }
.chat-msg.assistant code {
  background: #f1f5f9;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
}
.chat-msg.assistant pre {
  background: #1e293b;
  color: #e2e8f0;
  padding: 14px 16px;
  border-radius: 10px;
  overflow-x: auto;
  margin: 10px 0;
  font-size: 13px;
  line-height: 1.5;
}
.chat-msg.assistant pre code {
  background: transparent;
  padding: 0;
  color: inherit;
  font-size: inherit;
}
.chat-msg.assistant blockquote {
  border-left: 3px solid var(--primary);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}
.chat-msg.assistant table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
  font-size: 13px;
}
.chat-msg.assistant th, .chat-msg.assistant td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.chat-msg.assistant th { background: #f1f5f9; font-weight: 600; }
.chat-msg.assistant hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.chat-msg.assistant a { color: var(--primary); text-decoration: underline; }

.chat-typing {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 14px 18px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
}
.chat-typing .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #94a3b8;
  animation: typingBounce 1.4s infinite ease-in-out;
}
.chat-typing .dot:nth-child(2) { animation-delay: 0.2s; }
.chat-typing .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: white;
}
.chat-input-area textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.chat-input-area textarea:focus { border-color: var(--primary); }
.chat-send-btn {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
.chat-send-btn:hover { background: #1648c0; }
.chat-send-btn:disabled { background: #93b3f0; cursor: not-allowed; }
.chat-send-btn svg { width: 18px; height: 18px; fill: currentColor; }

.chat-welcome {
  text-align: center;
  color: var(--text-secondary);
  padding: 50px 30px;
  font-size: 14px;
  line-height: 1.8;
}
.chat-welcome .icon { font-size: 44px; margin-bottom: 14px; display: block; }
.chat-welcome .suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 14px;
}
.chat-welcome .suggestions button {
  font-size: 13px;
  padding: 6px 16px;
  border-radius: 16px;
  background: var(--primary-light);
  color: var(--primary);
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.chat-welcome .suggestions button:hover { background: #d4e2fc; }

.chat-error-msg {
  align-self: center;
  font-size: 13px;
  color: var(--danger);
  background: #fef2f2;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid #fecaca;
  max-width: 90%;
}

@media (max-width: 640px) {
  .chat-panel {
    width: calc(100vw - 16px);
    height: calc(100vh - 16px);
    max-height: none;
    border-radius: 12px;
  }
  .chat-toggle { right: 16px; bottom: 16px; width: 50px; height: 50px; font-size: 22px; }
  .chat-msg { max-width: 90%; }
  .chat-msg.assistant { max-width: 100%; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-logo">&#9878;</div><h1>法律文档智能问答</h1>
  <span class="badge">RAG</span>
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">检查中...</span></span>
    <span id="chunkCount">文档: -</span>
  </div>
</div>

<div class="container">
  <div class="search-box">
    <textarea id="questionInput" placeholder="请输入您的法律问题，例如：合同应当包括哪些主要条款？"></textarea>
    <div class="search-actions">
      <span class="hint">支持合同法、民法、刑法等法律领域问答</span>
      <button class="btn btn-primary" id="askBtn" onclick="ask()">提问</button>
    </div>
    <div class="example-questions">
      <button class="example-tag" onclick="setQuestion(this)">合同应当包括哪些主要条款？</button>
      <button class="example-tag" onclick="setQuestion(this)">什么是自首？自首有什么法律效果？</button>
      <button class="example-tag" onclick="setQuestion(this)">不动产物权如何设立？</button>
      <button class="example-tag" onclick="setQuestion(this)">完全民事行为能力人的认定标准是什么？</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在分析问题并检索法律文档...</div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="answer-card">
      <h2>回答</h2>
      <div class="answer-text" id="answerText"></div>
      <div class="confidence-bar">
        <span>整体可信度</span>
        <div class="confidence-track">
          <div class="confidence-fill" id="confidenceFill" style="width:0%"></div>
        </div>
        <span id="confidenceLabel">-</span>
      </div>
    </div>

    <div class="hallucination-card" id="hallucinationCard">
      <h2>逐句可信度检查</h2>
      <div id="hallucinationList"></div>
    </div>

    <div class="references-card">
      <h2>参考文档</h2>
      <div id="referencesList"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

async function checkStatus() {
  try {
    const r = await fetch(API_BASE + "/");
    const data = await r.json();
    document.getElementById("statusDot").className = "status-dot online";
    document.getElementById("statusText").textContent = "已就绪";
    document.getElementById("chunkCount").textContent = `文档: ${data.num_documents} | 片段: ${data.num_chunks}`;
  } catch {
    document.getElementById("statusDot").className = "status-dot offline";
    document.getElementById("statusText").textContent = "服务未连接";
  }
}

function setQuestion(el) {
  document.getElementById("questionInput").value = el.textContent;
  document.getElementById("questionInput").focus();
}

function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.classList.add("visible");
}

function hideError() {
  document.getElementById("errorMsg").classList.remove("visible");
}

async function ask() {
  const q = document.getElementById("questionInput").value.trim();
  if (!q) { showError("请输入问题"); return; }
  hideError();

  const btn = document.getElementById("askBtn");
  btn.disabled = true;
  document.getElementById("loading").classList.add("visible");
  document.getElementById("resultArea").classList.remove("visible");

  try {
    const r = await fetch(API_BASE + "/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, top_k: 5 }),
    });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.detail || "请求失败");
    }
    const data = await r.json();
    renderResult(data);
  } catch (e) {
    showError("请求出错: " + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById("loading").classList.remove("visible");
  }
}

function renderResult(data) {
  document.getElementById("resultArea").classList.add("visible");

  // Answer
  const answerText = data.answer;
  document.getElementById("answerText").innerHTML = marked.parse(answerText);

  // Confidence
  const checks = data.hallucination_checks || [];
  let avgConf = 0;
  if (checks.length > 0) {
    avgConf = checks.reduce((s, c) => s + c.confidence, 0) / checks.length;
  } else {
    avgConf = 0.85;
  }
  const pct = Math.round(avgConf * 100);
  const fill = document.getElementById("confidenceFill");
  fill.style.width = pct + "%";
  fill.className = "confidence-fill " + (pct >= 70 ? "high" : pct >= 40 ? "medium" : "low");
  document.getElementById("confidenceLabel").textContent = pct + "%";

  // Hallucination checks
  const hcList = document.getElementById("hallucinationList");
  hcList.innerHTML = "";
  if (checks.length > 0) {
    document.getElementById("hallucinationCard").style.display = "block";
    checks.forEach(c => {
      const div = document.createElement("div");
      div.className = "hc-item";
      const dotClass = c.confidence >= 0.7 ? "safe" : c.confidence >= 0.4 ? "uncertain" : "unsafe";
      div.innerHTML = `<span class="hc-dot ${dotClass}"></span><span>${c.sentence}</span><span style="margin-left:auto;font-size:12px;color:var(--text-secondary)">${Math.round(c.confidence * 100)}%</span>`;
      hcList.appendChild(div);
    });
  } else {
    document.getElementById("hallucinationCard").style.display = "none";
  }

  // References
  const refList = document.getElementById("referencesList");
  refList.innerHTML = "";
  (data.retrieved_chunks || []).forEach((ref, i) => {
    const div = document.createElement("div");
    div.className = "ref-item";
    div.innerHTML = `
      <div class="ref-meta">
        <span class="ref-level">${ref.level}</span>
        <span>${ref.source_file ? ref.source_file.split("\\").pop().split("/").pop() : "未知来源"}</span>
        <span style="margin-left:auto">得分: ${ref.score}</span>
      </div>
      <div class="ref-text">${escapeHtml(ref.text_preview)}</div>
    `;
    refList.appendChild(div);
  });
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

checkStatus();
setInterval(checkStatus, 15000);
</script>

<!-- ===== Floating Chat Assistant ===== -->

<div class="chat-overlay" id="chatOverlay" onclick="toggleChat()"></div>
<button class="chat-toggle" id="chatToggle" onclick="toggleChat()" title="打开AI助手">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
</button>

<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      AI 助手
    </div>
    <div class="chat-header-actions">
      <button class="chat-header-btn" onclick="clearChat()" title="清空对话">🗑</button>
      <button class="chat-header-btn" onclick="toggleChat()" title="收起">✕</button>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-welcome" id="chatWelcome">
      <span class="icon">💬</span>
      你好！我是 AI 助手，可以回答你的各种问题。
      <div class="suggestions">
        <button onclick="chatSendSuggestion('合同应当包括哪些主要条款？')">合同主要条款</button>
        <button onclick="chatSendSuggestion('什么是自首？')">自首的定义</button>
        <button onclick="chatSendSuggestion('人工智能有哪些应用？')">AI 应用</button>
        <button onclick="chatSendSuggestion('用Python写一个快速排序')">写代码</button>
      </div>
    </div>
  </div>
  <div class="chat-input-area">
    <textarea id="chatInput" rows="1" placeholder="输入问题，Enter发送，Shift+Enter换行" onkeydown="chatHandleKey(event)"></textarea>
    <button class="chat-send-btn" id="chatSendBtn" onclick="chatSend()" title="发送">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ===== Chat Assistant Logic =====
let chatHistory = [];
let chatSending = false;

function toggleChat() {
  const panel = document.getElementById("chatPanel");
  const overlay = document.getElementById("chatOverlay");
  const toggle = document.getElementById("chatToggle");
  panel.classList.toggle("open");
  overlay.classList.toggle("open");
  if (panel.classList.contains("open")) {
    setTimeout(() => document.getElementById("chatInput").focus(), 300);
  }
}

function addChatMsg(role, content) {
  const container = document.getElementById("chatMessages");
  const welcome = document.getElementById("chatWelcome");
  if (welcome) welcome.style.display = "none";

  const div = document.createElement("div");
  div.className = "chat-msg " + role;
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
  if (role === "assistant") {
    div.innerHTML = marked.parse(content) + '<span class="msg-time">' + timeStr + '</span>';
  } else {
    div.innerHTML = escapeHtml(content) + '<span class="msg-time">' + timeStr + '</span>';
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = "chat-typing";
  div.id = "chatTyping";
  div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("chatTyping");
  if (el) el.remove();
}

function showChatError(msg) {
  const container = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = "chat-error-msg";
  div.textContent = "⚠ " + msg;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function chatSend() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text || chatSending) return;

  chatSending = true;
  document.getElementById("chatSendBtn").disabled = true;

  // Add user message
  addChatMsg("user", text);
  chatHistory.push({ role: "user", content: text });
  input.value = "";
  input.style.height = "auto";

  showTyping();

  try {
    const r = await fetch(API_BASE + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: chatHistory, temperature: 0.7, max_tokens: 2048 }),
      signal: AbortSignal.timeout(30000),
    });

    hideTyping();

    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.detail || "请求失败");
    }

    const data = await r.json();
    addChatMsg("assistant", data.reply);
    chatHistory.push({ role: "assistant", content: data.reply });
  } catch (e) {
    hideTyping();
    if (e.name === "TimeoutError" || e.name === "AbortError") {
      showChatError("请求超时，请稍后重试");
    } else {
      showChatError(e.message);
    }
  } finally {
    chatSending = false;
    document.getElementById("chatSendBtn").disabled = false;
    document.getElementById("chatInput").focus();
  }
}

function chatHandleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    chatSend();
  }
  // Auto-resize textarea
  const el = e.target;
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function chatSendSuggestion(text) {
  document.getElementById("chatInput").value = text;
  chatSend();
}

function clearChat() {
  chatHistory = [];
  const container = document.getElementById("chatMessages");
  container.innerHTML = "";
  const welcome = document.getElementById("chatWelcome");
  welcome.style.display = "block";
  container.appendChild(welcome);
}

// Auto-focus input when panel opens
document.addEventListener("keydown", function(e) {
  const panel = document.getElementById("chatPanel");
  if (panel.classList.contains("open") && e.key === "Escape") {
    toggleChat();
  }
});
</script>

</body>
