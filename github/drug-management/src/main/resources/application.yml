spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hospital_drug?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456 # 改成你本地MySQL的root密码
  # Thymeleaf 配置（关闭缓存，方便调试）
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# 服务端口
server:
  port: 8081

# JWT 配置
jwt:
  secret: ${JWT_SECRET:drug-management-jwt-secret-key-2026-change-in-prod}

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hospital.drugmanagement.entity
  configuration:
    map-underscore-to-camel-case: true